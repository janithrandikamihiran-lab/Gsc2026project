<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>GSC Admin Panel | 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: white; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #161b22; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #30363d; }
        h2 { border-bottom: 2px solid #00FFD5; padding-bottom: 10px; color: #00FFD5; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #0d1117; }
        th, td { border: 1px solid #30363d; padding: 12px; text-align: left; }
        th { background: #00FFD5; color: black; font-weight: bold; }
        tr:nth-child(even) { background: #161b22; }
        tr:hover { background: #21262d; }
        .btn-refresh { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; float: right; font-weight: bold; }
        .login-box { text-align: center; padding: 40px; }
        input { padding: 12px; width: 250px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; margin-bottom: 10px; }
        .btn-login { padding: 12px 30px; background: #00FFD5; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: black; }
    </style>
</head>
<body>

<div class="container" id="login-area">
    <div class="login-box">
        <h2>🔒 Admin Login</h2>
        <p>GSC Technology Student Portal</p>
        <input type="password" id="admin-pass" placeholder="Password එක ඇතුළත් කරන්න"> <br>
        <button class="btn-login" onclick="checkPass()">LOGIN</button>
    </div>
</div>

<div class="container" id="admin-panel" style="display: none;">
    <button class="btn-refresh" onclick="fetchStudents()">Refresh List 🔄</button>
    <h2>👨‍🎓 Registered Students</h2>
    <table id="student-table">
        <thead>
            <tr>
                <th>Index Number</th>
                <th>Status</th>
                <th>Registered Date/Time</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://chsujlwtkzauuoiirhss.supabase.co';
    const SUPABASE_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoY3VqbHd0a3pldXVvaXJodHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mzg3NDIsImV4cCI6MjA4OTUxNDc0Mn0.NghFgyRg9FX9IWsBN4PaOvfl8HsH8hf8r-TN2zdIncI';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function checkPass() {
        const pass = document.getElementById('admin-pass').value;
        // මෙන්න මෙතන මම ඔයා ඉල්ලපු Password එක දැම්මා
        if(pass === "Janith2007#") { 
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            fetchStudents();
        } else {
            alert("වැරදි Password එකක්! ❌");
        }
    }

    async function fetchStudents() {
        const { data, error } = await _supabase
            .from('students')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error(error);
            alert("දත්ත ගේන්න බැරි වුණා! Table එක හදලද බලන්න.");
        } else {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";
            data.forEach(student => {
                const row = `<tr>
                    <td>${student.index_no}</td>
                    <td>${student.status || 'Active'}</td>
                    <td>${new Date(student.created_at).toLocaleString()}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }
    }
</script>
</body>
</html>
