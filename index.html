<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCIENCE COLLEGE TECH | CYBER-REVISION 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff0055;
            --dark-bg: #020204;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Matrix Rain Canvas --- */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
        }

        /* --- Animations --- */
        @keyframes border-rotate {
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes glitch-text {
            0% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); }
            50% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-cyan); }
            100% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); }
        }

        /* Navigation */
        nav {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .logo { 
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan); 
            font-weight: 900; 
            font-size: 1.8rem;
            letter-spacing: 3px;
            animation: glitch-text 0.5s infinite linear;
        }

        /* Header */
        header {
            padding: 100px 20px 50px;
            text-align: center;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 10vw, 5rem);
            text-transform: uppercase;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* --- The Psycho Grid --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            padding: 50px 10%;
        }

        .cyber-card {
            position: relative;
            background: var(--glass);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            transition: 0.5s;
            overflow: hidden;
            border: 1px solid rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(10px);
            transform-style: preserve-3d;
        }

        /* Animated Border Light */
        .cyber-card::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink), var(--neon-cyan));
            z-index: -1;
            background-size: 400%;
            animation: border-rotate 5s linear infinite;
            opacity: 0;
            transition: 0.5s;
        }

        .cyber-card:hover::before { opacity: 1; }

        .cyber-card:hover {
            transform: scale(1.05) rotateX(10deg) rotateY(10deg);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
        }

        .cyber-card i {
            font-size: 4rem;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px var(--neon-cyan));
        }

        .cyber-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* --- Ultimate Button --- */
        .btn-cyber {
            position: relative;
            display: inline-block;
            width: 100%;
            padding: 15px;
            background: transparent;
            color: var(--neon-cyan);
            text-transform: uppercase;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 4px;
            border: 2px solid var(--neon-cyan);
            cursor: pointer;
            transition: 0.4s;
            overflow: hidden;
            text-decoration: none;
        }

        .btn-cyber:hover {
            background: var(--neon-cyan);
            color: var(--dark-bg);
            box-shadow: 0 0 40px var(--neon-cyan);
            transform: scale(1.05);
        }

        .btn-cyber::after {
            content: "SYSTEM_ACCESS";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--neon-purple);
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(100%);
            transition: 0.3s;
            color: white;
        }

        .btn-cyber:hover::after { transform: translateY(0); }

        footer {
            padding: 60px;
            text-align: center;
            background: rgba(0,0,0,0.9);
            border-top: 1px solid var(--neon-purple);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            color: var(--neon-purple);
        }

    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <nav>
        <div class="logo">SC_TECH_2026</div>
    </nav>

    <header>
        <h1>DATABASE <span>DECRYPTED</span></h1>
        <p style="letter-spacing: 5px; color: var(--neon-purple);">SCIENCE COLLEGE MATALE | SYSTEM OVERRIDE</p>
    </header>

    <div class="grid-container">
        <div class="cyber-card">
            <i class="fas fa-terminal"></i>
            <h3>UNIT_01_CORE</h3>
            <a href="https://drive.google.com/drive/folders/1--Heq1hOQXCKZS9tno-DlTXkuvN-sx_-" target="_blank" class="btn-cyber">DOWNLOAD_PKT</a>
        </div>

        <div class="cyber-card">
            <i class="fas fa-microchip"></i>
            <h3>UNIT_02_ARCH</h3>
            <a href="https://drive.google.com/drive/folders/1--Heq1hOQXCKZS9tno-DlTXkuvN-sx_-" target="_blank" class="btn-cyber">DOWNLOAD_PKT</a>
        </div>

        <div class="cyber-card">
            <i class="fas fa-satellite-dish"></i>
            <h3>UNIT_03_NET</h3>
            <a href="https://drive.google.com/drive/folders/1--Heq1hOQXCKZS9tno-DlTXkuvN-sx_-" target="_blank" class="btn-cyber">DOWNLOAD_PKT</a>
        </div>

        <div class="cyber-card" style="border-color: var(--neon-pink);">
            <i class="fas fa-skull-crossbones" style="color: var(--neon-pink);"></i>
            <h3 style="color: var(--neon-pink);">MODEL_X_BETA</h3>
            <a href="https://drive.google.com/drive/folders/1--Heq1hOQXCKZS9tno-DlTXkuvN-sx_-" target="_blank" class="btn-cyber" style="border-color: var(--neon-pink); color: var(--neon-pink);">DECRYPT_NOW</a>
        </div>
    </div>

    <footer>
        <p>TERMINAL_CONNECTION: STABLE // 2026_VERSION</p>
    </footer>

    <script>
        // Matrix Rain Logic
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) drops[i] = 1;

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00f2ff";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // Window Resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>

</body>
</html>
